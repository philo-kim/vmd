<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VMD Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 240px;
        margin: 0;
        padding: 14px;
        background: #f6f8fb;
        color: #1f2933;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
        line-height: 1.25;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #17324d;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: #102a43;
      }
    </style>
  </head>
  <body>
    <h1>VMD visual-lossless viewer</h1>
    <button id="open-viewer" type="button">Open viewer</button>
    <script src="popup.js"></script>
  </body>
</html>
